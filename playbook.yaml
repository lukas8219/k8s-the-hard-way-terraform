---
- name: PKI
  hosts: localhost
  tasks:
    - name: Setup CA
      include_tasks: ./playbooks/pki/ca.yml
    - name: Setup Global Certificates
      include_tasks: ./playbooks/pki/certs.yml
      loop:
        - name: admin
          template: ./playbooks/pki/admin.conf.j2
- name: Configure Workers
  hosts: worker-nodes
  become: yes
  vars:
    root_ca_key: "{{ hostvars['localhost']['generated_root_ca_key']}}"
    root_ca_crt: "{{ hostvars['localhost']['generated_root_ca_crt']}}"
  vars_files:
    - ./playbooks/kubernetes_binaries.yml
  tasks:
    - name: Set host architecture
      include_tasks: ./playbooks/set_host_architecture.yml
    - name: containerd
      include_tasks: ./playbooks/containerd/playbook.yml
    - name: kubelet
      include_tasks: ./playbooks/kubelet/playbook.yml
    - name: kube-proxy
      include_tasks: ./playbooks/kube-proxy/playbook.yml
    - name: kube-scheduler
      include_tasks: ./playbooks/kube-scheduler/playbook.yml
    - name: kube-api-server
      include_tasks: ./playbooks/kube-api-server/playbook.yml
